name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on master
        run: git merge-base --is-ancestor "${{ github.sha }}" origin/master

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "npm"

      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run lint

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --notes-from-tag main.js manifest.json styles.css
        env:
          GH_TOKEN: ${{ github.token }}
